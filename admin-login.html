<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Bhakti Pushpa Bhandar</title>
  
  <!-- CDNs -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: linear-gradient(135deg, rgba(231, 84, 128, 0.15) 0%, rgba(212, 175, 55, 0.15) 100%), var(--cream);
    }
    .login-box {
      max-width: 450px;
      width: 100%;
      border-radius: 24px;
      padding: 45px 35px;
      background: var(--white);
      border: 1px solid rgba(183, 110, 121, 0.1);
      box-shadow: var(--box-shadow-medium);
    }
  </style>
</head>
<body>

  <!-- Falling Petals Canvas -->
  <canvas id="petals-canvas"></canvas>

  <div class="login-container">
    <div class="login-box text-center" data-aos="zoom-in">
      
      <!-- Brand Logo -->
      <a class="brand-container justify-content-center mb-4" href="index.html">
        <svg class="brand-logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:65px; height:65px;">
          <path d="M50 15C53 30 65 40 75 42C62 48 55 58 50 80C45 58 38 48 25 42C35 40 47 30 50 15Z" fill="url(#goldGradNav)"/>
          <path d="M50 28C52 38 60 45 68 46C58 50 53 58 50 72C47 58 42 50 32 46C40 45 48 38 50 28Z" fill="url(#pinkGradNav)"/>
          <defs>
            <linearGradient id="goldGradNav" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#E5C158" />
              <stop offset="100%" stop-color="#AA7C11" />
            </linearGradient>
            <linearGradient id="pinkGradNav" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#FFB5A7" />
              <stop offset="100%" stop-color="#E75480" />
            </linearGradient>
          </defs>
        </svg>
      </a>
      
      <h2 class="fw-bold mb-2" style="font-size:1.6rem; letter-spacing:1px;">Admin Access</h2>
      <p class="text-muted mb-4" style="font-size:0.9rem;">Sign in to manage catalog products, change discounts, and view custom requests.</p>
      
      <!-- Error Alert -->
      <div id="login-error-message" class="alert alert-danger d-none py-2" style="font-size: 0.85rem;"></div>

      <form id="admin-login-form">
        <div class="form-group-custom text-start">
          <label for="username" class="form-label-custom">Username</label>
          <input type="text" id="username" class="form-control-custom" placeholder="e.g. admin" required>
        </div>
        
        <div class="form-group-custom text-start">
          <label for="password" class="form-label-custom">Password</label>
          <input type="password" id="password" class="form-control-custom" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-premium btn-premium-gold w-100 justify-content-center py-3 mt-2">Sign In</button>
      </form>

      <div class="mt-4">
        <a href="index.html" class="text-muted" style="font-size:0.85rem;"><i class="fas fa-chevron-left"></i> Back to Homepage</a>
      </div>

    </div>
  </div>

  <!-- CDNs JS -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

  <script>
    // Initialize AOS immediately to prevent blank page cache issues
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof AOS !== 'undefined') {
        AOS.init({
          duration: 1000,
          once: true
        });
      }
    });
  </script>

  <!-- API Configuration -->
  <script src="js/config.js"></script>
  <script src="js/api-config.js"></script>

  <!-- Custom Scripts -->
  <script src="js/app.js?v=2"></script>
  <script src="js/admin.js?v=2"></script>
</body>
</html>
